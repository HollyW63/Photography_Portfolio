<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery &mdash; Holly Wang</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="page-frame">
        <nav class="nav">
            <a href="index.html" class="nav-name">Holly Wang</a>
            <button class="hamburger" aria-label="Toggle menu">
                <span></span><span></span>
            </button>
            <div class="nav-right">
                <a href="index.html" class="nav-link">Work</a>
                <a href="gallery.html" class="nav-link active">Gallery</a>
                <a href="about.html" class="nav-link">Info</a>
            </div>
        </nav>

        <header class="page-intro">
            <h1>Gallery</h1>
            <p>Things I noticed and couldn't walk past.</p>
        </header>

        <section class="gallery">
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="landscape">Landscape</button>
                <button class="filter-btn" data-filter="city">City</button>
                <button class="filter-btn" data-filter="nature">Nature</button>
            </div>

            <div class="gallery-grid">
                <div class="g-card color-yellow" data-category="landscape">
                    <img src="https://images.unsplash.com/photo-1624138784614-87fd1b6528f8?w=600&h=450&fit=crop" alt="Sydney Harbour">
                    <div class="g-overlay"><span>Golden Hour</span></div>
                </div>
                <div class="g-card color-blue" data-category="city">
                    <img src="https://images.unsplash.com/photo-1470723710355-95304d8aece4?w=600&h=450&fit=crop" alt="City skyline">
                    <div class="g-overlay"><span>City Skyline</span></div>
                </div>
                <div class="g-card color-pink" data-category="landscape">
                    <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&h=450&fit=crop" alt="Mountains">
                    <div class="g-overlay"><span>Ephemeral Stasis</span></div>
                </div>
                <div class="g-card color-green" data-category="nature">
                    <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600&h=450&fit=crop" alt="Forest">
                    <div class="g-overlay"><span>Green Canopy</span></div>
                </div>
                <div class="g-card color-lavender" data-category="city">
                    <img src="https://images.unsplash.com/photo-1487958449943-2429e8be8625?w=600&h=450&fit=crop" alt="Architecture">
                    <div class="g-overlay"><span>Glass & Steel</span></div>
                </div>
                <div class="g-card color-yellow" data-category="nature">
                    <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=600&h=450&fit=crop" alt="Misty hills">
                    <div class="g-overlay"><span>Botanic Walk</span></div>
                </div>
            </div>
        </section>

        <!-- Lightbox -->
        <div class="lightbox" id="lightbox">
            <button class="lb-close">&times;</button>
            <button class="lb-prev">&#8249;</button>
            <button class="lb-next">&#8250;</button>
            <img class="lb-img" id="lb-img" src="" alt="">
            <p class="lb-caption" id="lb-caption"></p>
        </div>

        <footer class="footer">
            <span>Holly Wang, 2025</span>
            <span>Sydney, Australia</span>
        </footer>
    </div>
</body>
</html>
